name: CI/CD — Build & Deploy to VPS

on:
  push:
    paths:
      - 'pre-ai-edtech/RAG_Teaching_Material/**'
  pull_request:
    paths:
      - 'pre-ai-edtech/RAG_Teaching_Material/**'


env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/rag-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/rag-frontend

jobs:
  # ── 1. Build & Push Images ─────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags)
        id: meta
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 2. Deploy to VPS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code (for compose file)
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          source:   "docker-compose.prod.yml"
          target:   "~/app/RAG_Teaching_Material/"

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ~/app/RAG_Teaching_Material

            # Write env file from secrets (only if not exists or force update)
            cat > .env.ci <<'ENVEOF'
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            COHERE_API_KEY=${{ secrets.COHERE_API_KEY }}
            GEMINI_LLM_MODEL=gemini-2.5-flash
            GEMINI_EMBEDDING_MODEL=models/gemini-embedding-001
            CHROMA_COLLECTION=rag_markdown_chunks_gem2
            CHROMA_PERSIST_DIR=/app/chroma_db
            LOG_LEVEL=INFO
            ENVEOF

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            export IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest
            export IMAGE_FRONTEND=${{ env.IMAGE_FRONTEND }}:latest
            docker compose -f docker-compose.prod.yml --env-file .env.ci pull

            # Rolling restart (zero-downtime within compose)
            docker compose -f docker-compose.prod.yml --env-file .env.ci up -d --remove-orphans

            # Cleanup old images
            docker image prune -f

            echo "✅ Deploy complete: $(date)"

  # ── 3. Smoke Test ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (post-deploy)
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for services to be ready
        run: sleep 20

      - name: Test frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }})
          echo "Frontend status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]

      - name: Test backend /docs
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}/api/docs)
          echo "Backend /docs status: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Test slides health endpoint
        run: |
          RESP=$(curl -sf http://${{ secrets.VPS_HOST }}/api/slides/health)
          echo "Slides health: $RESP"
          echo "$RESP" | grep -q "pptx_available"

      - name: Notify success
        if: success()
        run: echo "🎉 All smoke tests passed for commit ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Smoke tests FAILED for commit ${{ github.sha }}"
          exit 1
