# docker-compose.prod.yml — Production override
# Uses pre-built images from ghcr.io instead of building locally
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d

services:
  backend:
    image: ${IMAGE_BACKEND:-ghcr.io/your-org/rag-backend:latest}
    container_name: rag-backend
    restart: always
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
      - qdrant_data:/app/qdrant_db
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_PERSIST_DIR=/app/qdrant_db
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-rag_markdown_chunks_qdrant}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-models/gemini-embedding-001}
      - GEMINI_LLM_MODEL=${GEMINI_LLM_MODEL:-gemini-2.5-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - COHERE_RERANK_MODEL=${COHERE_RERANK_MODEL:-rerank-v3.5}
      - OCR_CACHE_ENABLED=${OCR_CACHE_ENABLED:-true}
      - OCR_CACHE_DIR=/app/uploads/ocr_page_cache
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ${IMAGE_FRONTEND:-ghcr.io/your-org/rag-frontend:latest}
    container_name: rag-frontend
    restart: always
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx reverse proxy (handles SSL termination on VPS)
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  uploads_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  default:
    name: rag-prod-network
