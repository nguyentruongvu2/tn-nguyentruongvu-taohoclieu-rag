server {
    listen 3000;
    server_name _;

    # Allow large multipart uploads to pass through proxy.
    # Keep this slightly above backend limit (50MB).
    client_max_body_size 55m;
    
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - send all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API calls to backend container for Docker runtime.
    location /api/ {
        client_max_body_size 55m;
        # Keep the original /api/* path when forwarding to backend.
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html and other HTML files
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
